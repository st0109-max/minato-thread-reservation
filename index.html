// ================= 日付ユーティリティ =================
const pad = (n) => String(n).padStart(2, "0");
const fmtDate = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

function localDate(dateStr, lang) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dow = new Date(y, m - 1, d).getDay();
  if (lang === "ja") return `${m}月${d}日(${WD.ja[dow]})`;
  if (lang === "zh") return `${m}月${d}日(周${WD.zh[dow]})`;
  if (lang === "th") return `${WD.th[dow]}. ${d} ${MONTH_SHORT.th[m - 1]}`;
  const wd = WD[lang][dow];
  const mo = MONTH_SHORT[lang][m - 1];
  if (lang === "en") return `${wd}, ${mo} ${d}`;
  return `${wd}, ${d} ${mo}`;
}

function monthLabel(year, month, lang) {
  if (lang === "ja" || lang === "zh") return `${year}年${month + 1}月`;
  return `${MONTH_NAMES[lang][month]} ${year}`;
}

function getMonths() {
  const now = new Date();
  return [0, 1].map((offset) => {
    const first = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    return { year: first.getFullYear(), month: first.getMonth() };
  });
}

function gcalUrl({ date, time, title, details }) {
  const d = date.replace(/-/g, "");
  const [h, mi] = time.split(":");
  const start = `${d}T${h}${mi}00`;
  const endH = mi === "30" ? pad(Number(h) + 1) : h;
  const endM = mi === "30" ? "00" : "30";
  const end = `${d}T${endH}${endM}00`;
  const p = new URLSearchParams({
    action: "TEMPLATE", text: title, dates: `${start}/${end}`,
    ctz: "Asia/Tokyo", details,
  });
  return `https://calendar.google.com/calendar/render?${p.toString()}`;
}

const NAME_KATAKANA = /^[ァ-ヶーヽヾ・\s\u3000]+$/;
const NAME_LATIN = /^[A-Za-z.\-'\s]+$/;

function cancelDeadlinePassed(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const deadline = new Date(y, m - 1, d - 1, 12, 0, 0);
  return new Date() >= deadline;
}

  async function toggleSlot(dateStr, time) {
    const cur = closedSlots[dateStr] || [];
    const nowClosed = cur.includes(time);
    try {
      if (nowClosed) {
        const { error: err } = await sb.from("closed_slots").delete().match({ date: dateStr, time });
        if (err) throw err;
      } else {
        const { error: err } = await sb.from("closed_slots").upsert({ date: dateStr, time });
        if (err) throw err;
      }
      setClosedSlots((prev) => {
        const n = { ...prev };
        if (nowClosed) {
          n[dateStr] = (n[dateStr] || []).filter((tt) => tt !== time);
          if (n[dateStr].length === 0) delete n[dateStr];
        } else {
          n[dateStr] = [...(n[dateStr] || []), time];
        }
        return n;
      });
      flash(`${jp(dateStr)} ${time} を${nowClosed ? "受付再開" : "停止"}しました`);
    } catch (e) {
      console.error(e);
      setError("枠の更新に失敗しました。もう一度お試しください。");
    }
  }

  async function setDayAll(dateStr, close) {
    try {
      if (close) {
        const { error: err } = await sb.from("closed_slots").upsert(SLOT_TIMES.map((tt) => ({ date: dateStr, time: tt })));
        if (err) throw err;
      } else {
        const { error: err } = await sb.from("closed_slots").delete().eq("date", dateStr);
        if (err) throw err;
      }
      setClosedSlots((prev) => {
        const n = { ...prev };
        if (close) n[dateStr] = [...SLOT_TIMES];
        else delete n[dateStr];
        return n;
      });
      flash(`${jp(dateStr)} の受付を${close ? "全て停止" : "全て再開"}しました`);
    } catch (e) {
      console.error(e);
      setError("枠の更新に失敗しました。もう一度お試しください。");
    }
  }

  async function applyBulk(close) {
    if (bulkSel.length === 0) return;
    try {
      if (close) {
        const rows = [];
        bulkSel.forEach((d) => SLOT_TIMES.forEach((tt) => rows.push({ date: d, time: tt })));
        const { error: err } = await sb.from("closed_slots").upsert(rows);
        if (err) throw err;
      } else {
        const { error: err } = await sb.from("closed_slots").delete().in("date", bulkSel);
        if (err) throw err;
      }
      setClosedSlots((prev) => {
        const n = { ...prev };
        bulkSel.forEach((d) => {
          if (close) n[d] = [...SLOT_TIMES];
          else delete n[d];
        });
        return n;
      });
      flash(`${bulkSel.length}日分を${close ? "休診(終日停止)に設定" : "営業に戻"}しました`);
      setBulkSel([]);
      setBulkMode(false);
    } catch (e) {
      console.error(e);
      setError("一括設定に失敗しました。もう一度お試しください。");
    }
  }

          const isSel = aSelDate === dateStr;

          if (isSun || isPast) { mark = "−"; markColor = "#B4C8D2"; }

          else if (allClosed) { mark = "×"; markColor = C.danger; }
          else if (partClosed) { mark = "△"; markColor = C.gold; }
          const disabled = isSun || isPast || (bulkMode && booked);
          return (
            <button key={dateStr} disabled={disabled}
              onClick={() => {
                if (bulkMode) {
                  setBulkSel((prev) => prev.includes(dateStr) ? prev.filter((x) => x !== dateStr) : [...prev, dateStr]);

              style={{
                background: C.card,
                border: `1px solid ${aListMode === "future" && b.date === tomorrow ? C.gold : C.line}`,
                opacity: aListMode === "past" ? 0.85 : 1,
              }}>
              <div className="flex items-start justify-between mb-2">
                <div>
                  <p className="text-base" style={{ fontFamily: fontDisplay, color: C.ink, fontWeight: 600 }}>{jp(b.date)} {b.time}〜</p>
                  <p className="text-sm mt-0.5" style={{ color: C.ink, fontWeight: 700 }}>
                    {b.name} 様
                    {b.lang && b.lang !== "ja" && (
                      <span className="ml-2 text-xs px-1.5 py-0.5 rounded" style={{ background: C.primarySoft, color: C.primary }}>{langLabel(b.lang)}</span>
                    )}
                  </p>
                  <p className="text-xs mt-0.5" style={{ color: C.sub }}>診察券 {b.clinicId} / 📞 {b.phone} / No. {b.bookingNo}</p>
                </div>
                {aListMode === "future" && b.date === tomorrow && (
                  <span className="text-xs px-2 py-1 rounded-full shrink-0" style={{ background: C.goldSoft, color: C.gold, fontWeight: 700 }}>明日</span>
                )}
                {aListMode === "past" && (
                  <span className="text-xs px-2 py-1 rounded-full shrink-0" style={{ background: C.bgAdmin, color: C.sub, fontWeight: 600 }}>済</span>
                )}
              </div>
              {aListMode === "future" && (
                <div className="flex gap-2">
                  <a href={gcalUrl({
                    date: b.date, time: b.time,
                    title: `【糸リフト】${b.name} 様`,
                    details: `予約番号: ${b.bookingNo}\n診察券番号: ${b.clinicId}\n携帯: ${b.phone}\n(${CLINIC_NAME} 予約システムより)`,
                  })} target="_blank" rel="noopener noreferrer" className="flex-1" style={{ textDecoration: "none" }}>
                    <Btn onClick={() => {}}>📅 カレンダー追加</Btn>
                  </a>
                  <div style={{ width: "110px" }}>
                    <Btn variant="danger" onClick={() => adminCancel(b)}>取り消す</Btn>
                  </div>
                </div>
              )}
            </div>
          ))
        )}
      </div>
    );
  }

  // ======================================================
  // ================= レイアウト =================
  // ======================================================
  if (mode === "login") {
    if (session) { setMode("admin"); return null; }
    return AdminLogin();
  }

  if (mode === "admin") {
    if (!session) { setMode("login"); return null; }
    return (
      <div className="min-h-screen" style={{ background: C.bgAdmin, fontFamily: fontBody }}>
        <header className="px-4 pt-5 pb-3" style={{ background: C.dark }}>
          <div className="max-w-md mx-auto flex items-center justify-between">
            <div>
              <p className="text-xs" style={{ color: C.aqua, letterSpacing: "0.2em" }}>予約管理</p>
              <h1 className="text-lg" style={{ fontFamily: fontDisplay, color: "#F2F8FA", margin: 0 }}>{CLINIC_NAME}</h1>
            </div>
            <div className="flex gap-2">
              <button onClick={loadAdmin} className="text-xs px-3 py-2 rounded-lg active:opacity-60"
                style={{ background: "#1A3A50", color: "#C2D6E0", fontWeight: 600, border: "none", cursor: "pointer" }}>
                ↻ 更新
              </button>
              <button onClick={doLogout}
                className="text-xs px-3 py-2 rounded-lg active:opacity-60"
                style={{ background: "#1A3A50", color: "#C2D6E0", fontWeight: 600, border: "none", cursor: "pointer" }}>
                ログアウト
              </button>
            </div>
          </div>
          <div className="max-w-md mx-auto flex gap-1 mt-3">
            {[["slots", "枠の管理"], ["bookings", "予約一覧"]].map(([k, label]) => (
              <button key={k} onClick={() => setATab(k)}
                className="flex-1 py-2.5 text-sm rounded-t-xl"
                style={{ fontWeight: 600, background: aTab === k ? C.bgAdmin : "transparent", color: aTab === k ? C.primary : "#7FA6B8", border: "none", cursor: "pointer" }}>
                {label}
              </button>
            ))}
          </div>
        </header>
        <main className="max-w-md mx-auto px-4 py-4 pb-12">
          {notice && (
            <div className="rounded-xl px-4 py-2.5 mb-3 text-sm" style={{ background: C.primarySoft, color: C.primary, fontWeight: 600 }}>✓ {notice}</div>
          )}
          {error && (
            <div className="rounded-xl px-4 py-2.5 mb-3 text-sm" style={{ background: C.dangerSoft, color: C.danger, fontWeight: 600 }}>{error}</div>
          )}
          {loading ? (
            <p className="text-center py-10 text-sm" style={{ color: C.sub }}>読み込んでいます…</p>
          ) : aTab === "slots" ? AdminSlots() : AdminBookings()}
        </main>
      </div>
    );
  }

  if (pScreen === "landing") return Landing();

  return (
    <div className="min-h-screen flex flex-col" style={{ background: C.bg, fontFamily: fontBody }}>
      <header className="text-center pt-7 pb-4 px-4">
        <p className="text-xs tracking-widest mb-1" style={{ color: C.gold, letterSpacing: "0.3em" }}>{t("webReserve")}</p>
        <h1 className="text-2xl" style={{ fontFamily: fontDisplay, color: C.ink, fontWeight: 600, margin: 0 }}>{CLINIC_NAME}</h1>
        <p className="text-sm mt-1" style={{ color: C.sub }}>{t("treatment")}</p>
        <div className="w-10 h-px mx-auto mt-3" style={{ background: C.gold }} />
      </header>
      <main className="max-w-md mx-auto px-4 pb-8 w-full flex-1" style={{ boxSizing: "border-box" }}>
        {loading ? (
          <p className="text-center py-10 text-sm" style={{ color: C.sub }}>{t("loadingAvail")}</p>
        ) : (
          <React.Fragment>
            {error && pScreen === "calendar" && (
              <p className="text-sm text-center mb-3" style={{ color: C.danger }}>{error}</p>
            )}
            {pScreen === "calendar" && PatientCalendar()}
            {pScreen === "time" && PatientTime()}
            {pScreen === "form" && PatientForm()}
            {pScreen === "confirm" && PatientConfirm()}
            {pScreen === "done" && PatientDone()}
            {pScreen === "lookup" && PatientLookup()}
          </React.Fragment>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
